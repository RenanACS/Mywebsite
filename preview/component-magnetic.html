<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="eyebrow" style="margin-bottom:14px;">magnetic cursor — pulls interactive elements toward pointer</div>
  <div style="position:relative;height:120px;background:#0A0A0C;border:1px solid var(--rs-line);border-radius:10px;overflow:hidden;display:flex;align-items:center;justify-content:center;gap:24px;">
    <!-- cursor visualization -->
    <div style="position:absolute;left:62%;top:50%;transform:translate(-50%,-50%);width:280px;height:280px;background:radial-gradient(circle,rgba(255,184,0,0.18) 0%,rgba(255,184,0,0) 60%);pointer-events:none;"></div>
    <div style="position:absolute;left:62%;top:50%;transform:translate(-50%,-50%);width:8px;height:8px;border:1px solid #FFB800;border-radius:50%;background:rgba(255,184,0,0.3);"></div>

    <!-- button being pulled toward the cursor -->
    <button style="position:relative;transform:translate(14px,-2px);background:#FFB800;color:#fff;border:none;border-radius:8px;padding:10px 18px;font-family:var(--rs-font-sans);font-size:14px;font-weight:500;letter-spacing:-0.01em;box-shadow:0 8px 30px -8px rgba(255,184,0,0.5);">Hover me →</button>
    <!-- arrow showing displacement -->
    <svg style="position:absolute;left:34%;top:50%;transform:translate(0,-50%);" width="80" height="20" viewBox="0 0 80 20" fill="none">
      <path d="M4 10 L72 10" stroke="rgba(255,255,255,0.3)" stroke-width="1" stroke-dasharray="3 3"/>
      <path d="M68 6 L74 10 L68 14" stroke="rgba(255,255,255,0.4)" stroke-width="1" fill="none"/>
    </svg>
    <span class="mono" style="position:absolute;bottom:10px;right:14px;font-size:10px;color:var(--rs-fg-3);">spring · 24px max pull · disabled on touch</span>
  </div>
</div></body></html>
