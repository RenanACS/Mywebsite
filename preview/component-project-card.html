<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="eyebrow" style="margin-bottom:14px;">project card · rest + neon-white hover</div>
  <div style="display:flex;gap:14px;">
    <div style="flex:1;background:#121215;border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:18px;box-shadow:inset 0 1px 0 rgba(255,255,255,0.04);display:flex;flex-direction:column;gap:14px;">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <span class="mono" style="font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.4);">01 · music</span>
        <span class="mono" style="font-size:11px;color:#FF8A3D;display:inline-flex;align-items:center;gap:6px;"><span style="width:6px;height:6px;border-radius:50%;background:#FF8A3D;"></span>WIP</span>
      </div>
      <div>
        <div style="font-family:var(--rs-font-sans);font-size:22px;font-weight:600;letter-spacing:-0.025em;color:#fff;line-height:1.15;display:flex;align-items:center;gap:10px;"><svg width="20" height="20" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7l1.5-4h7L13 7"/><ellipse cx="8" cy="8" rx="5.2" ry="1.6"/><path d="M3.5 9.5l-1 3.5"/><path d="M12.5 9.5l1 3.5"/><path d="M6.2 9.2l-.7 3.3"/><path d="M9.8 9.2l.7 3.3"/></svg>Drummer Simulator</div>
        <div style="font-family:var(--rs-font-sans);font-size:13px;color:rgba(255,255,255,0.6);margin-top:6px;line-height:1.5;">A playable kit in the browser. Web Audio, Canvas, keyboard + MIDI input.</div>
      </div>
      <div style="display:flex;gap:6px;margin-top:auto;">
        <span style="font-family:var(--rs-font-mono);font-size:10px;color:rgba(255,255,255,0.6);padding:3px 8px;border:1px solid var(--rs-line);border-radius:999px;">TS</span>
        <span style="font-family:var(--rs-font-mono);font-size:10px;color:rgba(255,255,255,0.6);padding:3px 8px;border:1px solid var(--rs-line);border-radius:999px;">Web Audio</span>
        <span style="font-family:var(--rs-font-mono);font-size:10px;color:rgba(255,255,255,0.6);padding:3px 8px;border:1px solid var(--rs-line);border-radius:999px;">Canvas</span>
      </div>
    </div>
    <div style="flex:1;background:#121215;border:1px solid rgba(255,255,255,0.5);border-radius:10px;padding:18px;box-shadow:0 0 0 1px rgba(255,255,255,0.5), 0 0 32px -4px rgba(255,255,255,0.18), inset 0 1px 0 rgba(255,255,255,0.1);display:flex;flex-direction:column;gap:14px;transform:translateY(-2px) rotate(0.4deg);">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <span class="mono" style="font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:#fff;">02 · security</span>
        <span class="mono" style="font-size:11px;color:#2BD37B;display:inline-flex;align-items:center;gap:6px;"><span style="width:6px;height:6px;border-radius:50%;background:#2BD37B;"></span>shipped</span>
      </div>
      <div>
        <div style="font-family:var(--rs-font-sans);font-size:22px;font-weight:600;letter-spacing:-0.025em;color:#fff;line-height:1.15;display:flex;align-items:center;gap:10px;"><svg width="20" height="20" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="7" width="10" height="7" rx="1.5"/><path d="M5.5 7V5a2.5 2.5 0 0 1 5 0v2"/><circle cx="8" cy="10.5" r="0.7" fill="currentColor" stroke="none"/><path d="M8 11.2v1.5"/></svg>Recon CLI</div>
        <div style="font-family:var(--rs-font-sans);font-size:13px;color:rgba(255,255,255,0.85);margin-top:6px;line-height:1.5;">Hover state · neon white halo, no chromatic. Action color stays amber.</div>
      </div>
      <div style="display:flex;gap:6px;margin-top:auto;">
        <span style="font-family:var(--rs-font-mono);font-size:10px;color:rgba(255,255,255,0.7);padding:3px 8px;border:1px solid rgba(255,255,255,0.18);border-radius:999px;">Go</span>
        <span style="font-family:var(--rs-font-mono);font-size:10px;color:rgba(255,255,255,0.7);padding:3px 8px;border:1px solid rgba(255,255,255,0.18);border-radius:999px;">Cobra</span>
      </div>
    </div>
  </div>
</div></body></html>
