<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div style="display:flex;flex-direction:column;gap:14px;">
    <div style="display:flex;align-items:baseline;gap:18px;">
      <span class="mono" style="font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--rs-fg-3);">01 / EYEBROW</span>
      <span class="label">10 · mono · 0.14em · uppercase</span>
    </div>
    <div style="display:flex;align-items:baseline;gap:18px;">
      <span class="mono" style="font-size:12px;color:var(--rs-fg-3);">// caption — used for paths, timestamps</span>
      <span class="label">12 · mono · default</span>
    </div>
    <div style="display:flex;align-items:baseline;gap:18px;">
      <span class="mono" style="font-size:13px;color:var(--rs-fg-1);background:var(--rs-surface);border:1px solid var(--rs-line);padding:2px 6px;border-radius:4px;">nmap&nbsp;-sV&nbsp;:8080</span>
      <span class="label">13 · inline code</span>
    </div>
    <div style="display:flex;align-items:baseline;gap:18px;">
      <a style="font-family:var(--rs-font-sans);font-size:15px;color:var(--rs-fg-1);text-decoration:none;border-bottom:1px solid var(--rs-line-strong);" href="#">linked text in prose</a>
      <span class="label">15 · link · hover → accent underline</span>
    </div>
  </div>
</div></body></html>
