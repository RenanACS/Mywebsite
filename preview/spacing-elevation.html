<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="eyebrow" style="margin-bottom:14px;">borders + elevation — hover is neon white, not chromatic</div>
  <div style="display:flex;gap:14px;">
    <div style="flex:1;background:#121215;border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:14px 16px;box-shadow:inset 0 1px 0 rgba(255,255,255,0.04);height:88px;display:flex;flex-direction:column;justify-content:space-between;">
      <span class="mono" style="font-size:11px;color:var(--rs-fg-1);">card · rest</span>
      <span class="label">1px · white/8 · inset top hl</span>
    </div>
    <div style="flex:1;background:#121215;border:1px solid rgba(255,255,255,0.5);border-radius:10px;padding:14px 16px;box-shadow:0 0 0 1px rgba(255,255,255,0.5), 0 0 32px -4px rgba(255,255,255,0.18), inset 0 1px 0 rgba(255,255,255,0.1);height:88px;display:flex;flex-direction:column;justify-content:space-between;transform:translateY(-2px);">
      <span class="mono" style="font-size:11px;color:#fff;">card · hover</span>
      <span class="label" style="color:rgba(255,255,255,0.7);">neon white · 32px soft halo</span>
    </div>
    <div style="flex:1;background:#FFB800;color:#000;border:1px solid #E0A000;border-radius:10px;padding:14px 16px;box-shadow:0 8px 40px -8px rgba(255,184,0,0.45);height:88px;display:flex;flex-direction:column;justify-content:space-between;">
      <span class="mono" style="font-size:11px;color:#000;">cta · primary</span>
      <span class="label" style="color:rgba(0,0,0,0.6);">amber fill = the action</span>
    </div>
  </div>
  <div class="label" style="margin-top:12px;">surface affordance vs. action — two different signals.</div>
</div></body></html>
