<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.btn { display:inline-flex; align-items:center; gap:8px; padding:10px 18px; border-radius:8px; font-family:var(--rs-font-sans); font-size:14px; font-weight:500; letter-spacing:-0.01em; cursor:pointer; border:1px solid transparent; transition:all .2s var(--rs-ease-out); }
.btn-primary { background:#FFB800; color:#fff; }
.btn-primary.h { background:#FFCC33; }
.btn-secondary { background:transparent; color:#fff; border-color:rgba(255,255,255,0.16); }
.btn-secondary.h { border-color:rgba(255,255,255,0.36); background:rgba(255,255,255,0.04); }
.btn-ghost { background:transparent; color:rgba(255,255,255,0.64); }
.btn-ghost.h { color:#fff; }
.mono-arrow { font-family:var(--rs-font-mono); font-size:13px; }
.row3 { display:flex; gap:10px; align-items:center; }
.colstack { display:flex; flex-direction:column; gap:8px; }
.tag { font-family:var(--rs-font-mono); font-size:10px; color:rgba(255,255,255,0.6); letter-spacing:0.14em; text-transform:uppercase; }
</style></head>
<body><div class="card">
  <div class="eyebrow" style="margin-bottom:14px;">buttons · primary / secondary / ghost · rest + hover</div>
  <div style="display:flex;flex-direction:column;gap:14px;">
    <div class="row3">
      <button class="btn btn-primary">Get in touch <span class="mono-arrow">→</span></button>
      <button class="btn btn-primary h">Get in touch <span class="mono-arrow">→</span></button>
      <span class="tag" style="margin-left:auto;">primary</span>
    </div>
    <div class="row3">
      <button class="btn btn-secondary">View résumé</button>
      <button class="btn btn-secondary h">View résumé</button>
      <span class="tag" style="margin-left:auto;">secondary</span>
    </div>
    <div class="row3">
      <button class="btn btn-ghost"><span class="mono-arrow">←</span> back</button>
      <button class="btn btn-ghost h"><span class="mono-arrow">←</span> back</button>
      <span class="tag" style="margin-left:auto;">ghost</span>
    </div>
  </div>
</div></body></html>
